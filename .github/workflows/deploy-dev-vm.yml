name: Deploy to DEV VM

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "k8s/**"
      - "*.md"

concurrency:
  group: deploy-dev-vm-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: "pocketlol-68ca6"
  REGION: "asia-south1"
  AR_REPO: "pocketlol"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ======================================================
      # 1. AUTHENTICATE & BUILD
      # ======================================================
      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/912340818228/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@pocketlol-68ca6.iam.gserviceaccount.com"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apigw: 'APIGW/**'
            auth-service: 'AuthService/**'
            user-service: 'UserService/**'
            content-service: 'ContentService/**'
            engagement-service: 'EngagementService/**'
            search-service: 'SearchService/**'
            upload-service: 'UploadService/**'
            subscription-service: 'SubscriptionService/**'
            transcoding-worker: 'TranscodingWorker/**'
            notification-service: 'NotificationService/**'

      - name: Build and Push Images
        run: |
          set -euo pipefail
          TAG="latest"
          registry="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}"

          build_push() {
            local name="$1"
            local dir="$2"
            local changed="$3"
            if [ "$changed" = "false" ]; then
              echo "Skipping $name (no changes detected)"
              return 0
            fi
            echo "Building $name..."
            docker buildx build --platform linux/amd64 -t "${registry}/${name}:${TAG}" "${dir}" --push
          }

          build_push apigw ./APIGW "${{ steps.filter.outputs.apigw }}"
          build_push auth-service ./AuthService "${{ steps.filter.outputs.auth-service }}"
          build_push user-service ./UserService "${{ steps.filter.outputs.user-service }}"
          build_push content-service ./ContentService "${{ steps.filter.outputs.content-service }}"
          build_push engagement-service ./EngagementService "${{ steps.filter.outputs.engagement-service }}"
          build_push search-service ./SearchService "${{ steps.filter.outputs.search-service }}"
          build_push upload-service ./UploadService "${{ steps.filter.outputs.upload-service }}"
          build_push subscription-service ./SubscriptionService "${{ steps.filter.outputs.subscription-service }}"
          build_push transcoding-worker ./TranscodingWorker "${{ steps.filter.outputs.transcoding-worker }}"
          build_push notification-service ./NotificationService "${{ steps.filter.outputs.notification-service }}"


      # ======================================================
      # 2. DEPLOY TO VM (SSH)
      # ======================================================

      # Copy the compose file to the VM
      - name: Copy Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USERNAME }}
          key: ${{ secrets.DEV_VM_SSH_KEY }}
          source: "docker-compose.deploy.yml"
          target: "~/"

      # SSH to run the deployment
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USERNAME }}
          key: ${{ secrets.DEV_VM_SSH_KEY }}
          script: |
            set -e

            # Setup environment
            # Rename the file we just copied
            mv ~/docker-compose.deploy.yml ~/docker-compose.yml

            # Login to Artifact Registry
            gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

            # Pull & Restart
            docker compose pull
            docker compose up -d --remove-orphans

            # Cleanup
            docker image prune -f
