# ============================================
# Horizontal Pod Autoscaler - All Services
# ============================================
# Minimum: 1 replica (idle / low traffic)
# Maximum: scales based on service criticality
# Target: 70% CPU utilization triggers scale-up
# Scale-down: 5 min stabilization window (K8s default)
# ============================================

# --- API Gateway (entry point, highest scale) ---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: apigw-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apigw
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
