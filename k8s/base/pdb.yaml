# PodDisruptionBudgets — ensures at least 1 pod remains available during
# node drains (GKE auto-upgrades, manual maintenance). Works in tandem with
# the HPA: when scaled to >=2 replicas, evictions are serialized; at 1 replica
# GKE will still proceed after the PDB eviction timeout to avoid blocking
# node upgrades indefinitely.

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: apigw-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: apigw
---
