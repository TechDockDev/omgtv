apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

patchesStrategicMerge:
  - patch-ingress-host.yaml
  - patch-configmaps.yaml
  - patch-worker-disable.yaml

resources:
  - ../../base
  - managedcertificate.yaml

images:
  - name: apigw
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/apigw
    newTag: latest
  - name: auth-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/auth-service
    newTag: latest
  - name: user-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/user-service
    newTag: latest
  - name: content-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/content-service
    newTag: latest
  - name: engagement-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/engagement-service
    newTag: latest
  - name: search-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/search-service
    newTag: latest

  - name: upload-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/upload-service
    newTag: latest
  - name: subscription-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/subscription-service
    newTag: latest
  - name: notification-service
    newName: asia-south1-docker.pkg.dev/omg-tv-497110/pocketlol/notification-service
    newTag: latest
